version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo Installing backend dependencies...

  build:
    commands:
      - echo Building Spring Boot application...
      - cd backend
      - mvn clean package -DskipTests

  post_build:
    commands:
      - echo Preparing deployment package...
      - mkdir package
      
      # Target the exact finalName specified in your pom.xml
      - cp backend/target/buildright-app.jar package/
      
      - cp appspec.yml package/
      - cp -r scripts package/

artifacts:
  base-directory: package
  files:
    - '**/*'
  name: buildright-backend.zip
