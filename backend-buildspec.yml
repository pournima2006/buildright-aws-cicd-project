version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo Installing backend dependencies...

  build:
    commands:
      - echo Building Spring Boot application...
      # Change directory within the build phase before running Maven
      - cd backend
      - mvn clean package -DskipTests

  post_build:
    commands:
      - echo Preparing deployment package...
      # CodeBuild automatically starts this phase in the source root
      # Create the package directory inside the root
      - mkdir package
      - cp backend/target/*.jar package/
      - cp appspec.yml package/
      - cp -r scripts package/

artifacts:
  base-directory: package
  files:
    - '**/*'
  name: buildright-backend.zip
