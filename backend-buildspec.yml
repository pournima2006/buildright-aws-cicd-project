version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo Installing backend dependencies...

  build:
    commands:
      - echo Building Spring Boot application...
      - cd backend
      - mvn clean package -DskipTests

  post_build:
    commands:
      - echo "--- DIAGNOSTIC MODE: Checking Root Directory ---"
      - ls -la
      
      - echo "--- DIAGNOSTIC MODE: Checking Target Directory ---"
      - ls -la backend/target/ || echo "TARGET DIRECTORY MISSING!"
      
      - echo Preparing deployment package...
      - mkdir package
      
      # The "|| true" forces CodeBuild to continue even if the command fails, 
      # allowing us to see the exact error in the logs without stopping the pipeline.
      - echo "Copying JAR..."
      - cp backend/target/buildright-app.jar package/ || echo ">>> ERROR: FAILED TO COPY JAR"
      
      - echo "Copying appspec.yml..."
      - cp appspec.yml package/ || echo ">>> ERROR: FAILED TO COPY APPSPEC.YML"
      
      - echo "Copying scripts folder..."
      - cp -r scripts package/ || echo ">>> ERROR: FAILED TO COPY SCRIPTS FOLDER"
      
      - echo "--- DIAGNOSTIC MODE: Checking Final Package Contents ---"
      - ls -la package/

artifacts:
  base-directory: package
  files:
    - '**/*'
  name: buildright-backend.zip
